<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unirse | Modern Registry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.symbols.outlined&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <span class="material-symbols-outlined">how_to_reg</span>
                    Sistema de Registro
                </a>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="registro.html" class="active">Registro</a></li>
                    <li><a href="login.html">Acceso</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="card form-auth">
            <h2 style="margin-bottom: 0.5rem; text-align: center;">Registro de Usuario</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.875rem;">Regístrate como usuario normal para acceder al sistema.</p>
            
            <form id="registroForm">
                <div id="registroError" class="alert-error" style="display: none;">
                    <span class="material-symbols-outlined" style="font-size: 1.25rem;">error</span>
                    <span id="registroErrorMessage"></span>
                </div>
                <div class="form-group">
                    <label for="primer_nombre">Primer Nombre</label>
                    <input type="text" id="primer_nombre" name="primer_nombre" placeholder="Andrés" required>
                </div>
                <div class="form-group">
                    <label for="segundo_nombre">Segundo Nombre (opcional)</label>
                    <input type="text" id="segundo_nombre" name="segundo_nombre" placeholder="José">
                </div>
                <div class="form-group">
                    <label for="primer_apellido">Primer Apellido</label>
                    <input type="text" id="primer_apellido" name="primer_apellido" placeholder="García" required>
                </div>
                <div class="form-group">
                    <label for="segundo_apellido">Segundo Apellido (opcional)</label>
                    <input type="text" id="segundo_apellido" name="segundo_apellido" placeholder="Pérez">
                </div>
                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad" placeholder="24" min="1" required>
                </div>
                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input type="text" id="cedula" name="cedula" placeholder="1234567890" required>
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" placeholder="andres@modern.io" required>
                </div>
                <div class="form-group">
                    <label for="adminRole">Rol</label>
                    <select id="adminRole" required>
                        <option value="estudiante">Estudiante</option>
                        <option value="docente">Docente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Finalizar Registro</button>
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text-muted);">
                    ¿Ya tienes cuenta? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Inicia sesión</a>
                </p>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Modern Registry. Profesionalismo en cada píxel.</p>
                <ul class="footer-nav">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="login.html">Acceso</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../../static/js/main.js"></script>
</body>
</html>
