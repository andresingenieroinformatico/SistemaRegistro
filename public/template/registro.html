<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Nocturne Registry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="material-symbols-outlined logo-icon">account_circle</span>
            Nocturne Registry
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="registro.html" class="active">Registro</a></li>
                <li><a href="lista.html">Usuarios</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" style="margin-top: 8rem;">
        <main>
            <div style="text-align: center; margin-bottom: 3rem;">
                <h3 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Crea tu <span class="text-gradient">Identidad</span></h3>
                <p style="color: var(--on-surface-variant);">Ingresa tus datos para unirte al archivo.</p>
            </div>

            <div class="form-card glass-panel">
                <form id="registroForm">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Andres Garcia" required>
                    </div>
                    <div class="form-group">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" name="correo" placeholder="andres@example.io" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Finalizar Registro</button>
                </form>
            </div>
        </main>

        <footer class="footer">
            &copy; 2026 Nocturne Pro. Mejorado con StitchMCP.
        </footer>
    </div>
</body>
</html>
