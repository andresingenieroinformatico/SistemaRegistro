<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Usuario | Modern Registry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/styles.css">
</head>
<body class="bg-soft">
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <span class="material-symbols-outlined">how_to_reg</span>
                    Sistema de Registro
                </a>
                <ul class="nav-links">
                    <li><a href="user.html" class="active">Mi Cuenta</a></li>
                    <li><a href="#" id="logoutBtn" style="color: var(--accent);">Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero user-panel">
            <div class="hero-content">
                <h1>Bienvenido, <span id="userPageTitle" class="text-gradient">Usuario</span></h1>
                <p class="hero-copy">
                    Has ingresado correctamente como usuario normal. Aquí puedes continuar navegando por la plataforma.
                </p>
                <div class="hero-actions">
                    <a href="index.html" class="btn btn-outline">Volver al Inicio</a>
                    <a href="#" id="logoutBtnMobile" class="btn btn-primary">Cerrar Sesión</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Modern Registry. Acceso de usuario normal.</p>
                <ul class="footer-nav">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="login.html">Acceso</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../../static/js/main.js"></script>

</html>
