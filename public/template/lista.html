<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | Modern Registry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/styles.css">
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <span class="material-symbols-outlined">how_to_reg</span>
                    Sistema de Registro
                </a>
                <ul class="nav-links">
                    <li><a href="lista.html" class="active">Usuarios</a></li>
                    <li><a href="#" id="logoutBtn" style="color: var(--accent);">Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container dashboard-container">
        <div class="dashboard-header">
            <div>
                <h2 style="font-size: 2rem;">Archivo de <span class="text-gradient">Usuarios</span></h2>
                <p style="color: var(--text-muted);">Gestiona los accesos y roles de la plataforma.</p>
            </div>
            <a href="registro.html" class="btn btn-primary">
                <span class="material-symbols-outlined" style="margin-right: 0.5rem;">add</span>
                Nuevo Usuario
            </a>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Identidad</th>
                        <th>Correo Electrónico</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 Modern Registry. Panel Administrativo Protegido.</p>
                <ul class="footer-nav">
                    <li><a href="index.html">Página Principal</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Editar <span class="text-gradient">Identidad</span></h3>
            </div>
            <form id="editForm">
                <input type="hidden" id="editOriginalEmail">
                <div class="form-group">
                    <label for="editNombre">Nombre</label>
                    <input type="text" id="editNombre" required>
                </div>
                <div class="form-group">
                    <label for="editCorreo">Correo</label>
                    <input type="email" id="editCorreo" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../static/js/main.js"></script>
</body>
</html>
